name: ci

on:
  push:
    branches: ["main", "master"]
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --configuration Release --no-restore

      - name: Test
        run: |
          dotnet test integration-hub-service.Tests/integration-hub-service.Tests.csproj --configuration Release --no-build
          dotnet test liquidacion-service.Tests/liquidacion-service.Tests.csproj --configuration Release --no-build
          dotnet test portal-bff-service.Tests/portal-bff-service.Tests.csproj --configuration Release --no-build
